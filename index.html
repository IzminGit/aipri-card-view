<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>おねがいアイプリ カードビューアー</title>
<style>
  body { font-family: sans-serif; margin: 0; background: #fff0f8; color: #c040a0; }
  .tabs { display: flex; gap: 4px; padding: 8px; background: #ffe4f0; position: sticky; top: 0; z-index: 1; }
  .tab { flex: 1; border: 1px solid #f3a6ce; border-radius: 10px; background: white; padding: 8px 4px; font-weight: bold; color: #c040a0; }
  .tab.active { background: #ffd6eb; }
  .card-bar { display: flex; justify-content: space-between; padding: 8px 12px; background: rgba(255,255,255,.75); }
  .main { padding: 12px; text-align: center; }
  .card-scene { width: min(88vw, 360px); margin: 12px auto; }
  img { width: 100%; border-radius: 14px; box-shadow: 0 8px 28px rgba(255,120,180,.25); }
  .nav-buttons { display: flex; justify-content: center; gap: 24px; align-items: center; margin: 12px; }
  .nav-btn, .view-toggle-btn, .side-toggle-btn { border: 1px solid #f3a6ce; background: white; color: #c040a0; border-radius: 10px; padding: 8px 12px; font-weight: bold; }
  .grid-view { display: none; padding: 8px; }
  .grid-cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  body.mode-grid .main { display: none; }
  body.mode-grid .grid-view { display: block; }
  body.mode-grid .side-toggle-btn { display: inline-block; }
  .side-toggle-btn { display: none; }
</style>
</head>
<body>
<div class="tabs" id="tabs">
  <button class="tab active" data-set="0">全て</button>
  <button class="tab" data-set="1">SPカード</button>
</div>
<div class="card-bar">
  <div id="bar-id"></div><div id="bar-char"></div><div id="bar-stars"></div>
  <button class="side-toggle-btn" id="side-toggle">裏面</button>
  <button class="view-toggle-btn" id="view-toggle">一覧</button>
</div>
<div class="main">
  <h3 id="card-name"></h3>
  <div class="card-scene"><img id="img-front" src="" alt="カード表面"></div>
  <div id="card-progress"></div>
  <div class="nav-buttons"><button class="nav-btn" id="btn-prev">◀</button><span>タップで裏面表示</span><button class="nav-btn" id="btn-next">▶</button></div>
</div>
<div class="grid-view"><div class="grid-cards" id="grid-cards"></div></div>
<script>
const SETS = [
  { label: '全て', base: '', cards: [] },
  {
    label: 'スペシャルカード',
    base: 'https://aipri.jp/card/img/special/',
    cards: [
      { id:'OP-042', name:'たなばたおねがいミント', char:'あおい', rarity:4 },
      { id:'OP-041', name:'シールぺったんチアホワイトブルー', char:'あおい', rarity:4 },
      { id:'OP-040', name:'きらめきティアラリボン', char:'あおい', rarity:4 },
      { id:'OP-039', name:'シナモロール なかよしドリーム', char:'あおい', rarity:4 },
      { id:'OP-038', name:'ハローキティ なかよしラブリー', char:'いのり', rarity:4 },
      { id:'OP-037', name:'フォーチュおやすみ', char:'あおい', rarity:4 },
      { id:'OP-036', name:'フォーチュおやすみ', char:'いのり', rarity:4 },
      { id:'OP-035', name:'きらめきティアラリボン', char:'いのり', rarity:4 },
      { id:'OP-033', name:'おねがいパティシエール ハローキティ', char:'いのり', rarity:4 },
      { id:'OP-032', name:'おねがいパティシエール ポムポムプリン', char:'おりびあ', rarity:4 },
      { id:'OP-021', name:'やきたてクッキーいちごミルク', char:'あおい', rarity:4 },
      { id:'OP-022', name:'すきすきハートバズリウム', char:'いのり', rarity:4 },
      { id:'OP-015', name:'ほしのゆうびんやさんイエロー', char:'あおい', rarity:4 },
      { id:'OP-020', name:'ラブリーマーガレットイエロー', char:'いのり', rarity:4 },
      { id:'OP-018', name:'トキメキトゥインクルグリーン', char:'ぐみ', rarity:4 },
      { id:'OP-014', name:'すきのクリスタルいのりピンク', char:'いのり', rarity:4 },
      { id:'OTOY-015', name:'プリズムハートパープル', char:'あおい', rarity:4 },
      { id:'OTOY-005', name:'リボンアイドルパステル', char:'あおい', rarity:4 },
      { id:'OTOY-004', name:'リボンアイドルパステル', char:'いのり', rarity:4 },
      { id:'OTOY-003', name:'アイプリゆめゆめブルー', char:'あおい', rarity:4 },
      { id:'OTOY-002', name:'アイプリすきすきレッド', char:'いのり', rarity:4 },
      { id:'OTOY-001', name:'プリズムハートブルー', char:'あおい', rarity:4 },
      { id:'OTOY-000', name:'プリズムハートピンク', char:'いのり', rarity:4 },
    ]
  }
];
SETS[0].cards = SETS.slice(1).flatMap(s => s.cards.map(c => ({ ...c, base: s.base })));
let currentSetIndex = 0, currentIndex = 0, cards = SETS[0].cards, base = '', side = 'O', viewMode = 'single';
const img = document.getElementById('img-front');
function imgUrl(card, s = side) { return `${card.base || base}${card.id}_${s}.webp`; }
function updateDisplay(card, index) { document.getElementById('bar-id').textContent = card.id; document.getElementById('bar-char').textContent = card.char; document.getElementById('bar-stars').textContent = '★'.repeat(card.rarity); document.getElementById('card-name').textContent = card.name; document.getElementById('card-progress').textContent = `${index + 1} / ${cards.length}`; img.src = imgUrl(card); }
function switchSet(i) { currentSetIndex = i; cards = SETS[i].cards; base = SETS[i].base; currentIndex = 0; document.querySelectorAll('.tab').forEach((t, n) => t.classList.toggle('active', n === i)); updateDisplay(cards[0], 0); renderGrid(); }
function navigate(d) { currentIndex = (currentIndex + d + cards.length) % cards.length; updateDisplay(cards[currentIndex], currentIndex); }
function flip() { side = side === 'O' ? 'U' : 'O'; updateDisplay(cards[currentIndex], currentIndex); }
function renderGrid() { const c = document.getElementById('grid-cards'); c.innerHTML = ''; cards.forEach((card, i) => { const d = document.createElement('div'); const im = document.createElement('img'); im.src = imgUrl(card); im.alt = card.name; d.appendChild(im); d.onclick = () => { currentIndex = i; updateDisplay(card, i); setViewMode('single'); }; c.appendChild(d); }); }
function setViewMode(m) { viewMode = m; document.body.classList.toggle('mode-grid', m === 'grid'); document.getElementById('view-toggle').textContent = m === 'grid' ? '1枚' : '一覧'; if (m === 'grid') renderGrid(); }
document.getElementById('tabs').onclick = e => { const t = e.target.closest('.tab'); if (t) switchSet(Number(t.dataset.set)); };
document.getElementById('btn-prev').onclick = () => navigate(-1);
document.getElementById('btn-next').onclick = () => navigate(1);
document.getElementById('img-front').onclick = flip;
document.getElementById('view-toggle').onclick = () => setViewMode(viewMode === 'single' ? 'grid' : 'single');
document.getElementById('side-toggle').onclick = flip;
updateDisplay(cards[0], 0);
</script>
</body>
</html>
